# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
# 这是唯一的最终生产配置（cinegearpro.co.uk 上安装的 app）。
# 详见 HANDOVER.md。改配置后需 `shopify app deploy` 才会生效到线上。

client_id = "97309ed864212552105a92b64020fda9"
application_url = "https://back-in-stock-app-production.up.railway.app"
embedded = true
name = "Back In Stock Dev"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory/update"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  # 转化追踪需要 orders/create + read_orders（受保护客户数据）。
  # 先在 Developer Dashboard 开启 Protected customer data access 后，再取消下面注释。
  # [[webhooks.subscriptions]]
  # topics = [ "orders/create" ]
  # uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_products,read_locations"

[auth]
redirect_urls = [
  "https://back-in-stock-app-production.up.railway.app/auth/callback",
  "https://back-in-stock-app-production.up.railway.app/auth/shopify/callback",
  "https://back-in-stock-app-production.up.railway.app/api/auth/callback"
]

[app_proxy]
# 不能带路径！storefront /apps/back-in-stock/subscribe 会被转发到 <url>/subscribe。
url = "https://back-in-stock-app-production.up.railway.app"
subpath = "back-in-stock"
prefix = "apps"

[build]
# 部署到固定域名后关掉：避免本地误跑 dev 把生产 URL 改回隧道。
automatically_update_urls_on_dev = false
